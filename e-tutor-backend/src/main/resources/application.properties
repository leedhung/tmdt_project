# Spring Boot application server configuration
server.port=8081
server.servlet.context-path=/api/v1

# MySQL Database Connection Configuration (Docker Container)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/etutor_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=etutor_user
spring.datasource.password=etutor_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configurations
# Secret key must be at least 256 bits (32 characters)
etutor.jwt.secret=9a4f2c8d3e7b1a5f6c8d9e0b1a2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c
# Access Token expiration: 1 hour (3600000 milliseconds)
etutor.jwt.accessTokenExpirationMs=3600000
# Refresh Token expiration: 7 days (604800000 milliseconds)
etutor.jwt.refreshTokenExpirationMs=604800000

# Spring Mail Configurations (SMTP Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Dynamic CORS Allowed Origins Whitelist
etutor.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080}

# Cloudinary Configurations
cloudinary.cloud-name=${CLOUD_NAME}
cloudinary.api-key=${CLOUD_API_KEY}
cloudinary.api-secret=${CLOUD_API_SECRET}

